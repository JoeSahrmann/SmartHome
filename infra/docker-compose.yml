version: '3.9'

name: smarthome

services:
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "echo 'frontend shell running' && sleep infinity"
    volumes:
      - ../frontend:/app
    ports:
      - "3000:3000"
    depends_on:
      - chores-service
      - habits-service
      - menu-service
      - grocery-service
      - briefing-service

  chores-service:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "echo 'chores-service running' && sleep infinity"
    volumes:
      - ../services/chores-service:/app
    environment:
      - DATABASE_URL=postgresql://smarthome:smarthome@db:5432/smarthome
    depends_on:
      - db

  habits-service:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "echo 'habits-service running' && sleep infinity"
    volumes:
      - ../services/habits-service:/app
    environment:
      - DATABASE_URL=postgresql://smarthome:smarthome@db:5432/smarthome
    depends_on:
      - db

  menu-service:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "echo 'menu-service running' && sleep infinity"
    volumes:
      - ../services/menu-service:/app
    environment:
      - DATABASE_URL=postgresql://smarthome:smarthome@db:5432/smarthome
    depends_on:
      - db

  grocery-service:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "echo 'grocery-service running' && sleep infinity"
    volumes:
      - ../services/grocery-service:/app
    environment:
      - DATABASE_URL=postgresql://smarthome:smarthome@db:5432/smarthome
    depends_on:
      - db

  briefing-service:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "echo 'briefing-service running' && sleep infinity"
    volumes:
      - ../services/briefing-service:/app
    environment:
      - DATABASE_URL=postgresql://smarthome:smarthome@db:5432/smarthome
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=smarthome
      - POSTGRES_PASSWORD=smarthome
      - POSTGRES_DB=smarthome
    ports:
      - "5432:5432"
    volumes:
      - smarthome-db-data:/var/lib/postgresql/data

volumes:
  smarthome-db-data:
